# ─────────────────────────────────────────────────────────────────────────────
# frontend/nginx.conf
# Nginx Configuration for the Frontend Container
#
# Nginx serves the static HTML/CSS/JS files AND proxies API calls to Flask.
# This means the browser only talks to one host (the Nginx container),
# which avoids CORS complexity in production deployments.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # ── Static Files ─────────────────────────────────────────────────────────
    # Serve HTML, CSS, and JS from the /usr/share/nginx/html directory.
    # This is where we copy our frontend files in the Docker image.
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively (they don't change unless redeployed)
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── API Proxy ─────────────────────────────────────────────────────────────
    # Any request starting with /api or /health or /metrics gets forwarded
    # to the Flask backend container (named "backend" in docker-compose.yml).
    # Docker's internal DNS resolves "backend" to the backend container's IP.
    location ~ ^/(api|health|metrics) {
        proxy_pass http://backend:5000;

        # Forward original request headers so Flask sees the real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: give Flask up to 60s to respond
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────────
    # For any unmatched path, serve index.html.
    # This supports client-side routing if ever added.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error Pages ──────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Compress text responses to reduce bandwidth usage
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
