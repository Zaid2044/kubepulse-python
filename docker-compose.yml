services:
  database:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_pass}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - inventory_network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-inventory_pass}@database:5432/${POSTGRES_DB:-inventory_db}
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-in-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}

    depends_on:
      database:
        condition: service_healthy

    networks:
      - inventory_network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - inventory_network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  inventory_network:
    driver: bridge

volumes:
  postgres_data:
